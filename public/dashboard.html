<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Dashboard</h2>

    <div class="dashboard-buttons">
        <button onclick="goToAdd()"> Add Blog</button>
        <button onclick="logout()">Logout</button>
    </div>

    <h2>All Blogs</h2>
    <div id="blogs"></div>

    <script>
        const token = localStorage.getItem('token');
        const currentUserId = localStorage.getItem('userId');

        if (!token) {
            window.location.href = "login.html";
        }

        // redirect
        function goToAdd() {
            window.location.href = "addBlog.html";
        }

        // logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            localStorage.clear();
            window.location.href = "login.html";
        }

        // fetch blogs
        async function getBlogs() {
            const res = await fetch('http://localhost:3001/api/blogs');
            const data = await res.json();

            const container = document.getElementById('blogs');
            container.innerHTML = "";

            data.forEach(blog => {

                // 🔥 check owner
                const isOwner = blog.userId._id === currentUserId;

                container.innerHTML += `
    <div class="blog-card">
        <h3>${blog.title}</h3>
        <p>${blog.content}</p>
        <p class="author">Author: ${blog.userId.name}</p>

        <div class="blog-actions">
            ${isOwner
                        ? `
                    <button onclick="editBlog('${blog._id}')"> Update</button>
                    <button onclick="deleteBlog('${blog._id}')"> Delete</button>
                  `
                        : `<span style="color:gray;">View Only</span>`
                    }
        </div>
    </div>
`;
            });
        }

        // delete blog
        async function deleteBlog(id) {
            await fetch(`http://localhost:3001/api/blogs/${id}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });

            alert("Deleted!");
            getBlogs();
        }

        // go to edit page
        function editBlog(id) {
            localStorage.setItem('editId', id);
            window.location.href = "editBlog.html";
        }

        getBlogs();
    </script>

</body>

</html>
