<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Signup</h2>

<form id="signupForm">
    <input type="text" placeholder="Name" id="name" required><br>
    <input type="email" placeholder="Email" id="email" required><br>
    <input type="password" placeholder="Password" id="password" required><br>
    <button type="submit">Signup</button>

    <!-- 🔥 Login Redirect -->
    <p style="text-align:center; margin-top:10px;">
        Already have an account? 
        <a href="login.html">Login</a>
    </p>
</form>

<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('http://localhost:3001/api/auth/signup', { // 🔥 fixed port
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        console.log(data);

        alert(data.msg || data.error || "Signup done!");

        if (res.ok) {
            window.location.href = "login.html";
        }

    } catch (error) {
        console.log(error);
        alert("Something went wrong");
    }
});
</script>

</body>
</html>
